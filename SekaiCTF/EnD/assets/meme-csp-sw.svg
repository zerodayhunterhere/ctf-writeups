<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#eef4f1"/>
  <rect x="44" y="44" width="1112" height="587" rx="28" fill="#fbfffd" stroke="#bfd6cb" stroke-width="4"/>
  <text x="600" y="110" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#1d4031">CSP vs. the smuggled service worker</text>
  <rect x="110" y="180" width="430" height="340" rx="24" fill="#dff0e8" stroke="#7bb89d" stroke-width="4"/>
  <text x="325" y="250" text-anchor="middle" font-family="Courier New, monospace" font-size="28" font-weight="700" fill="#1f5d42">proxy/app.js</text>
  <text x="325" y="320" text-anchor="middle" font-family="Courier New, monospace" font-size="26" fill="#1f5d42">script-src 'self'</text>
  <text x="325" y="365" text-anchor="middle" font-family="Courier New, monospace" font-size="26" fill="#1f5d42">worker-src 'self'</text>
  <text x="325" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#1f5d42">Proxy: "No outside scripts."</text>
  <rect x="660" y="180" width="430" height="340" rx="24" fill="#ffe8ef" stroke="#dd84a1" stroke-width="4"/>
  <text x="875" y="250" text-anchor="middle" font-family="Courier New, monospace" font-size="28" font-weight="700" fill="#8c274d">smuggled response</text>
  <text x="875" y="320" text-anchor="middle" font-family="Courier New, monospace" font-size="24" fill="#8c274d">Service-Worker-Allowed: /</text>
  <text x="875" y="365" text-anchor="middle" font-family="Courier New, monospace" font-size="24" fill="#8c274d">Content-Security-Policy: relaxed</text>
  <text x="875" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#8c274d">Attacker: "Perfect, I am 'self' now."</text>
  <text x="600" y="585" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#2d4d3f">If your proxy can be desynced, your CSP becomes a suggestion written on the wrong response.</text>
</svg>

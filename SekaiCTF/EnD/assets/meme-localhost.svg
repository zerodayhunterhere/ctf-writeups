<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#f4efe7"/>
  <rect x="36" y="36" width="1128" height="603" rx="28" fill="#fffaf2" stroke="#d8c8b2" stroke-width="4"/>
  <text x="600" y="110" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#3d2a1d">"localhost is safe"</text>
  <text x="600" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#6b5443">proxy after accepting a public URL and replaying it under /view/*</text>
  <rect x="110" y="220" width="420" height="300" rx="24" fill="#e8f0ff" stroke="#8ba7de" stroke-width="4"/>
  <text x="320" y="285" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#314d7d">Blue Team</text>
  <text x="320" y="345" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#314d7d">"We block private IPs."</text>
  <text x="320" y="385" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#314d7d">"We strip cookies."</text>
  <text x="320" y="425" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#314d7d">"Everything important is on localhost."</text>
  <rect x="670" y="220" width="420" height="300" rx="24" fill="#ffe9d8" stroke="#e0a26d" stroke-width="4"/>
  <text x="880" y="285" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#8a4a14">Attacker</text>
  <text x="880" y="345" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#8a4a14">"Nice controls."</text>
  <text x="880" y="385" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#8a4a14">"I will simply host a public page"</text>
  <text x="880" y="425" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#8a4a14">"and let /view/ make it localhost for me."</text>
  <text x="600" y="585" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#4c3a2a">CTF lesson: if the browser sees localhost, your hostname filter is already yesterday's problem.</text>
</svg>

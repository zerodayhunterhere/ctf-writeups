<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <rect width="600" height="340" rx="12" fill="#1a1a2e"/>
  <text x="300" y="40" text-anchor="middle" font-family="Impact,sans-serif" font-size="22" fill="#e94560" font-weight="bold">THE CSP HEADER</text>
  <rect x="170" y="60" width="260" height="60" rx="8" fill="#16213e" stroke="#e94560" stroke-width="2"/>
  <text x="300" y="96" text-anchor="middle" font-family="monospace" font-size="13" fill="#00ff88">Content-Security-Policy:</text>
  <text x="300" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#00ff88">script-src 'nonce-...'</text>
  <text x="300" y="155" text-anchor="middle" font-family="Impact,sans-serif" font-size="18" fill="#fff">vs</text>
  <text x="300" y="185" text-anchor="middle" font-family="Impact,sans-serif" font-size="22" fill="#e94560" font-weight="bold">1001 QUERY PARAMETERS</text>
  <text x="300" y="220" text-anchor="middle" font-family="monospace" font-size="28" fill="#00ff88">a&amp;a&amp;a&amp;a&amp;a&amp;a&amp;a&amp;a&amp;a&amp;a...</text>
  <text x="300" y="265" text-anchor="middle" font-family="Impact,sans-serif" font-size="16" fill="#ffd700">PHP Warning: Input variables exceeded 1000</text>
  <text x="300" y="290" text-anchor="middle" font-family="Impact,sans-serif" font-size="14" fill="#aaa">*output already started, headers locked*</text>
  <text x="300" y="325" text-anchor="middle" font-family="Impact,sans-serif" font-size="28" fill="#e94560" font-weight="bold">CSP: "I guess I'll just die"</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" viewBox="0 0 600 320">
  <rect width="600" height="320" rx="12" fill="#0d1117"/>
  <text x="300" y="35" text-anchor="middle" font-family="Impact,sans-serif" font-size="20" fill="#58a6ff">DRAKE MEME BUT IT'S PHP EXTENSIONS</text>
  <!-- Top: rejected -->
  <rect x="20" y="50" width="560" height="55" rx="8" fill="#21262d"/>
  <text x="40" y="72" font-family="monospace" font-size="14" fill="#f85149">// Normal XSS?</text>
  <text x="40" y="92" font-family="monospace" font-size="12" fill="#8b949e">htmlspecialchars() says no lol</text>
  <text x="530" y="82" text-anchor="middle" font-family="sans-serif" font-size="28">😐</text>
  <!-- Middle: rejected -->
  <rect x="20" y="115" width="560" height="55" rx="8" fill="#21262d"/>
  <text x="40" y="137" font-family="monospace" font-size="14" fill="#f85149">// Template injection?</text>
  <text x="40" y="157" font-family="monospace" font-size="12" fill="#8b949e">it's plain PHP, no template engine</text>
  <text x="530" y="147" text-anchor="middle" font-family="sans-serif" font-size="28">😐</text>
  <!-- Bottom: accepted -->
  <rect x="20" y="180" width="560" height="80" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="40" y="205" font-family="monospace" font-size="14" fill="#58a6ff">// Heap overflow in a PHP C extension</text>
  <text x="40" y="225" font-family="monospace" font-size="14" fill="#58a6ff">// that corrupts memo.len to 0x1000</text>
  <text x="40" y="245" font-family="monospace" font-size="14" fill="#58a6ff">// and OOB-reads your XSS from the carry</text>
  <text x="530" y="225" text-anchor="middle" font-family="sans-serif" font-size="28">😏</text>
  <text x="300" y="295" text-anchor="middle" font-family="Impact,sans-serif" font-size="22" fill="#ffd700">"it's not a bug, it's a folio feature"</text>
</svg>
